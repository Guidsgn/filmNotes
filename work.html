<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obra — film notes</title>
  <link rel="icon" type="image/png" href="imgs/iconFilmNote-colored.png">
  <link rel="apple-touch-icon" href="imgs/iconFilmNote-colored.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <img src="imgs/iconFilmNote-colored.png" alt="">
        film <span>notes</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a class="nav-link" href="index.html">Início</a>
        <a class="nav-link" href="reviews.html">Minhas Reviews</a>
        <a class="nav-link" href="search.html">Explorar</a>
      </div>
      <div class="nav-search">
        <span class="icon">&#9906;</span>
        <input type="text" id="navSearchInput" placeholder="Buscar...">
      </div>
      <button type="button" class="nav-settings-btn" onclick="Utils.openSettingsModal()" title="Configurações">⚙</button>
      <button type="button" class="nav-menu-btn" id="navMenuBtn">☰</button>
    </div>
  </nav>

  <div class="work-backdrop-wrap" id="backdropWrap">
    <div class="work-backdrop-overlay"></div>
  </div>

  <div class="loading-center" id="loadingState">
    <div class="spinner"></div>
  </div>

  <div class="work-detail-hidden" id="workContent">
    <div class="container">
      <div class="work-detail-wrap">

        <nav class="work-breadcrumb">
          <a href="index.html">Início</a>
          <span class="sep">›</span>
          <a href="search.html">Explorar</a>
          <span class="sep">›</span>
          <span id="breadcrumbTitle"></span>
        </nav>

        <div class="work-content-row">
          <div class="work-poster-col">
            <div id="workPoster"></div>
          </div>
          <div class="work-info-col">
            <div class="work-type-tag" id="workTypeTag"></div>
            <h1 class="work-title" id="workTitle"></h1>
            <p class="work-tagline" id="workTagline"></p>
            <div class="work-genres" id="workGenres"></div>
            <p class="work-overview" id="workOverview"></p>
            <div class="work-meta-grid" id="workMeta"></div>
            <div class="tmdb-rating-wrap" id="tmdbRatingWrap">
              <div class="tmdb-rating-label">Nota TMDB</div>
              <div class="tmdb-rating-value" id="tmdbRatingVal"></div>
            </div>
          </div>
        </div>

        <div class="section work-cast-section" id="castSection">
          <div class="section-head">
            <h2 class="section-title">Elenco</h2>
          </div>
          <div class="cast-row" id="castRow"></div>
        </div>

        <hr class="divider">

        <div class="section">
          <div class="review-box" id="reviewBox">
            <div class="review-box-header">
              <div class="review-box-title" id="reviewBoxTitle">Minha review</div>
              <div id="reviewBoxActions"></div>
            </div>
            <div class="review-box-body" id="reviewBoxBody"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="container work-detail-hidden" id="errorState">
    <div class="empty-state">
      <div class="empty-icon">😕</div>
      <div class="empty-title">Erro ao carregar</div>
      <div class="empty-text" id="errorMsg">Não foi possível carregar os dados desta obra.</div>
      <a href="search.html" class="btn btn-ghost error-back-btn">← Voltar</a>
    </div>
  </div>

  <div class="modal-overlay confirm-modal" id="deleteModal">
    <div class="modal-box">
      <span class="confirm-icon">🗑</span>
      <div class="modal-title">Excluir review?</div>
      <p class="modal-desc">Esta ação não pode ser desfeita.</p>
      <div class="modal-actions modal-actions-center">
        <button type="button" class="btn btn-danger-ghost" id="confirmDeleteBtn">Sim, excluir</button>
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('deleteModal').classList.remove('open')">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="imgs/iconFilmNote-colored.png" alt="">
        film <span>notes</span>
      </div>
      <div class="footer-text">Dados: TMDB & Google Books</div>
    </div>
  </footer>

  <script src="js/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/work.js"></script>
</body>
</html>
